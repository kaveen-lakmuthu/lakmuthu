<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default " en-us" }}">

<head>
  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (savedTheme === 'light') {
          document.documentElement.classList.add('light');
        }
      } catch (e) {
        console.warn('localStorage is blocked or unavailable:', e);
      }
    })();
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description"
    content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary }}{{ else }}{{ .Site.Title }}{{ end }}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title"
    content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
  <meta property="og:description"
    content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary }}{{ else }}{{ .Site.Title }}{{ end }}">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:url" content="{{ .Permalink }}">
  <meta name="twitter:title"
    content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
  <meta name="twitter:description"
    content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary }}{{ else }}{{ .Site.Title }}{{ end }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }} Feed" href="{{ "index.xml" | relURL }}">

  {{ if .IsHome }}
  <!-- JSON-LD Schema Markup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Kaveen Lakmuthu",
    "jobTitle": "Software Engineer & Systems Specialist",
    "url": "{{ .Permalink }}",
    "sameAs": [
      "https://github.com/kaveen-lakmuthu",
      "https://linkedin.com/in/kaveen-lakmuthu",
      "https://x.com/kaveen_lakmuthu",
      "https://youtube.com/@klakmuthu"
    ],
    "description": "Helping businesses and developers solve software, Linux, infrastructure, and deployment problems."
  }
  </script>
  {{ end }}
</head>

<body>
  <header>
    <div class="logo">
      <a href="{{ "" | relURL }}">{{ .Site.Title }}</a>
    </div>
    <nav>
      <a href="{{ "" | relURL }}"{{ if .IsHome }} class="active"{{ end }}><span>Home</span></a>
      <a href="{{ "about/" | relURL }}"{{ if eq .RelPermalink ("/about/" | relURL) }} class="active"{{ end }}><span>About</span></a>
      <a href="{{ "services/" | relURL }}"{{ if eq .RelPermalink ("/services/" | relURL) }} class="active"{{ end }}><span>Services</span></a>
      <a href="{{ "investigations/" | relURL }}"{{ if or (eq .Section "investigations") (eq .RelPermalink ("/investigations/" | relURL)) }} class="active"{{ end }}><span>Investigations</span></a>
      <a href="{{ "projects/" | relURL }}"{{ if or (eq .Section "projects") (eq .RelPermalink ("/projects/" | relURL)) }} class="active"{{ end }}><span>Projects</span></a>
      <a href="{{ "now/" | relURL }}"{{ if eq .RelPermalink ("/now/" | relURL) }} class="active"{{ end }}><span>Now</span></a>
      <a href="{{ "contact/" | relURL }}"{{ if eq .RelPermalink ("/contact/" | relURL) }} class="active"{{ end }}><span>Contact</span></a>
      <button id="theme-toggle" aria-label="Toggle theme" class="theme-toggle-btn">&#9790;</button>
    </nav>
  </header>
  <hr>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved. | <a href="{{ "contact/" | relURL }}">Contact</a> | <a href="{{ "now/" | relURL }}">Now</a> | <a href="{{ "license/" | relURL }}">License</a> | <a href="{{ "index.xml" | relURL }}">RSS</a></p>
  </footer>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('theme-toggle');
      const root = document.documentElement;

      const getTheme = () => {
        if (root.classList.contains('dark')) return 'dark';
        if (root.classList.contains('light')) return 'light';
        try {
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        } catch (e) {
          return 'light';
        }
      };

      const updateButton = (theme) => {
        toggle.innerHTML = theme === 'dark' ? '&#9728;' : '&#9790;';
      };

      let currentTheme = getTheme();
      updateButton(currentTheme);

      toggle.addEventListener('click', () => {
        currentTheme = getTheme();
        if (currentTheme === 'dark') {
          root.classList.remove('dark');
          root.classList.add('light');
          try {
            localStorage.setItem('theme', 'light');
          } catch (e) {
            console.warn('localStorage is blocked or unavailable:', e);
          }
          updateButton('light');
        } else {
          root.classList.remove('light');
          root.classList.add('dark');
          try {
            localStorage.setItem('theme', 'dark');
          } catch (e) {
            console.warn('localStorage is blocked or unavailable:', e);
          }
          updateButton('dark');
        }
      });
    });
  </script>
</body>

</html>
