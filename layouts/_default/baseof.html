<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .IsPage }}{{ .Summary }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header>
    <div class="logo">
      <a href="/">{{ .Site.Title }}</a>
    </div>
    <nav>
      <a href="/">Home</a> |
      <a href="/about/">About</a> |
      <a href="/services/">Services</a> |
      <a href="/investigations/">Investigations</a> |
      <a href="/projects/">Projects</a> |
      <a href="/now/">Now</a> |
      <a href="/contact/">Contact</a>
    </nav>
  </header>
  <hr>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <hr>
  <footer>
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved. | <a href="/contact/">Contact</a> | <a href="/now/">Now</a></p>
  </footer>
</body>
</html>
