<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .IsPage }}{{ .Summary }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>
  <header>
    <div class="logo">
      <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    </div>
    <nav>
      <a href="{{ "/" | relURL }}">Home</a> |
      <a href="{{ "/about/" | relURL }}">About</a> |
      <a href="{{ "/services/" | relURL }}">Services</a> |
      <a href="{{ "/investigations/" | relURL }}">Investigations</a> |
      <a href="{{ "/projects/" | relURL }}">Projects</a> |
      <a href="{{ "/now/" | relURL }}">Now</a> |
      <a href="{{ "/contact/" | relURL }}">Contact</a>
    </nav>
  </header>
  <hr>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <hr>
  <footer>
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved. | <a href="{{ "/contact/" | relURL }}">Contact</a> | <a href="{{ "/now/" | relURL }}">Now</a></p>
  </footer>
</body>
</html>
